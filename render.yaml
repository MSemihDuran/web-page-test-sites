# Render Blueprint Specification for Web Page Test Sites (Monorepo)
# To deploy, go to Render dashboard -> Blueprints -> New Blueprint Instance -> Select repository.

services:
  - type: static
    name: burak-tekstil-3d
    rootDir: burak-modern-portfolio
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /logo.png
        name: Cache-Control
        value: public, max-age=86400
